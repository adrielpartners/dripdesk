services:
  postgres:
    image: postgres:16-alpine
    container_name: dripdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dripdesk
      POSTGRES_PASSWORD: dripdesk
      POSTGRES_DB: dripdesk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dripdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dripdesk-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: dripdesk-api
    restart: unless-stopped
    environment:
      DRIPDESK_API_PORT: 3000
      DRIPDESK_DATABASE_URL: postgresql://dripdesk:dripdesk@postgres:5432/dripdesk?schema=public
      DRIPDESK_REDIS_URL: redis://redis:6379
      DRIPDESK_ENCRYPTION_KEY: ${DRIPDESK_ENCRYPTION_KEY}
      DRIPDESK_SESSION_SECRET: ${DRIPDESK_SESSION_SECRET}
      DRIPDESK_PUBLIC_API_URL: http://api:3000/api
      DRIPDESK_PUBLIC_WEB_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: dripdesk-worker
    restart: unless-stopped
    environment:
      DRIPDESK_ENV: development
      DRIPDESK_REDIS_URL: redis://redis:6379
      DRIPDESK_PUBLIC_API_URL: http://api:3000/api
      DRIPDESK_PUBLIC_WEB_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    container_name: dripdesk-web
    restart: unless-stopped
    environment:
      DRIPDESK_PUBLIC_API_URL: http://localhost:3000/api
      DRIPDESK_PUBLIC_WEB_URL: http://localhost:3001
      PORT: 3001
      HOST: 0.0.0.0
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: